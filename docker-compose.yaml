services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: lixian-online:latest
    container_name: lixian-online
    restart: unless-stopped
    ports:
      - "12723:12723"
    environment:
      NODE_ENV: production
      PORT: "12723"
      HOSTNAME: 0.0.0.0
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:12723/').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
